worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    limit_req_zone $binary_remote_addr zone=client_update:10m rate=30r/m;

    # Gzip
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ArtTalk Client
    server {
        listen 80;
        server_name _;

        # ArtTalk Web Client
        location / {
            root   /usr/share/nginx/html/im;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # Admin Panel
        location /admin {
            alias /usr/share/nginx/html/admin;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # Backend API
        location ~ ^/api/client/(releases/policy|update-events)$ {
            limit_req zone=client_update burst=20 nodelay;
            proxy_pass http://im-backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api {
            proxy_pass http://im-backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeout for file uploads
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            client_max_body_size 128M;
            proxy_request_buffering off;
        }

        # Signed Electron update artifacts. The runner writes the host directory; Nginx mounts it read-only.
        location ~* ^/downloads/arttalk/.+\.(yml)$ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            limit_except GET HEAD { deny all; }
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header X-Content-Type-Options nosniff always;
        }

        location ~* ^/downloads/arttalk/.+\.(exe|blockmap)$ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            limit_except GET HEAD { deny all; }
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Accept-Ranges bytes always;
            add_header X-Content-Type-Options nosniff always;
        }

        location /downloads/arttalk/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            autoindex off;
            limit_except GET HEAD { deny all; }
            add_header Accept-Ranges bytes always;
            add_header X-Content-Type-Options nosniff always;
        }

        # WebSocket
        location /ws {
            proxy_pass http://im-backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }
    }
}
