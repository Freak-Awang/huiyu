server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/im_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
  servlet:
    multipart:
      max-file-size: 128MB
      max-request-size: 128MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:im-secret-key-needs-changing-in-production-2024!}

file:
  storage: ${FILE_STORAGE:local}
  max-size: ${FILE_MAX_SIZE:53687091200}
  small-file-max-size: ${FILE_SMALL_FILE_MAX_SIZE:104857600}
  chunk-size: ${FILE_CHUNK_SIZE:67108864}
  retention-days: ${FILE_RETENTION_DAYS:7}
  upload-retention-hours: ${FILE_UPLOAD_RETENTION_HOURS:24}
  upload-path: ${FILE_UPLOAD_PATH:./upload}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    bucket: ${MINIO_BUCKET:im-files}
    access-key: ${MINIO_ACCESS_KEY:imadmin}
    secret-key: ${MINIO_SECRET_KEY:impassword}
